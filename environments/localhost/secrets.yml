---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sealed-secrets
  namespace: kube-system
spec:
  interval: 1m
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: flux-fleet
  wait: true
  path: "./infrastructure/secrets"
  prune: true
  timeout: 1m