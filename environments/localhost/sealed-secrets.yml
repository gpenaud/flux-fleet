---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: sealed-secrets
spec:
  interval: 5m0s
  url: https://bitnami-labs.github.io/sealed-secrets

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: sealed-secrets
  namespace: kube-system
spec:
  interval: 5m0s
  chart: sealed-secrets
  reconcileStrategy: ChartVersion
  sourceRef:
    kind: HelmRepository
    name: sealed-secrets
  version: '2.18.*'
  values:
      fullnameOverride: sealed-secrets-controller
