---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: kube-system
spec:
  interval: 1m
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: flux-fleet
  wait: true
  path: "./infrastructure/certificates/helm-cert-manager"
  prune: true
  timeout: 1m

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mkcert-issuer
  namespace: kube-system
spec:
  dependsOn:
    - name: cert-manager
  interval: 1m
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: flux-fleet
  path: "./infrastructure/certificates/issuers"
  prune: true
  timeout: 1m