---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik
  namespace: kube-system
spec:
  interval: 1m
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: flux-fleet
  wait: true
  path: "./infrastructure/network/traefik/helm-traefik"
  prune: true
  timeout: 1m

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  dependsOn:
    - name: traefik
    - name: mkcert-issuer
  interval: 1m
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: flux-fleet
  path: "./infrastructure/network/traefik/traefik-dashboard"
  prune: true
  timeout: 1m
  postBuild:
    substitute:
      traefik_fqdn: traefikant.gpenaud.localhost