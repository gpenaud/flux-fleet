---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: kube-system
spec:
  interval: 5m
  timeout: 5m
  chart:
    spec:
      chart: cert-manager
      version: 'v1.19.*'
      sourceRef:
        kind: OCIRepository
        name: cert-manager
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    crds:
      enabled: true
    prometheus:
      enabled: false