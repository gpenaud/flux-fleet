---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-cni
  namespace: kube-system
spec:
  interval: 5m
  timeout: 5m
  chart:
    spec:
      chart: cni
      sourceRef:
        kind: HelmRepository
        name: istio
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    profile: ambient