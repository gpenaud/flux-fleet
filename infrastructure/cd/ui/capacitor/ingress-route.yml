---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: capacitor
  namespace: flux-system
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${capacitor_fqdn}`)
      kind: Rule
      services:
        - name: capacitor
          port: 9000
  tls:
    secretName: capacitor-cert