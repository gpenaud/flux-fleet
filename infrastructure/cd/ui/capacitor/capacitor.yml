---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: capacitor
  namespace: flux-system
spec:
  interval: 12h
  url: oci://ghcr.io/gimlet-io/capacitor-manifests
  ref:
    semver: ">=0.1.0"

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: capacitor
  namespace: flux-system
spec:
  targetNamespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  wait: true
  prune: true
  path: "./"
  sourceRef:
    kind: OCIRepository
    name: capacitor

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: capacitor
  namespace: flux-system
spec:
  secretName: capacitor-cert
  dnsNames:
    - "${capacitor_fqdn}"
  issuerRef:
    name: mkcert-issuer
    kind: ClusterIssuer

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: capacitor
  namespace: flux-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${capacitor_fqdn}`)
      kind: Rule
      services:
        - name: capacitor
          port: 9000
  tls:
    secretName: capacitor-cert